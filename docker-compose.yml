version: '3.8'
services:
  deepsproxy:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DEEPSEEK_EMAIL=seu_email_aqui
      - DEEPSEEK_PASSWORD=sua_senha_aqui
      - PORT=3000
      - API_KEY=sua_api_key_aqui
    volumes:
      - ./deepseek_profile:/app/deepseek_profile
    restart: unless-stopped
